apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-api
  labels:
    app.kubernetes.io/name: pipeline-api
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipeline-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipeline-api
        app.kubernetes.io/component: pipeline
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: pipeline-api
          image: clinical-pipeline-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: APP_PATH
              value: /data/results/data
            - name: NLP_BACKEND_URL
              value: "http://annotation-api:8001"
            - name: NLP_FRONTEND_URL
              value: "http://annotation-web:3000"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: pipeline-results
              mountPath: /data/results
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: pipeline-results
          persistentVolumeClaim:
            claimName: pipeline-results
