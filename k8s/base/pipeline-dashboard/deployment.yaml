apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline-dashboard
  labels:
    app.kubernetes.io/name: pipeline-dashboard
    app.kubernetes.io/component: pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipeline-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipeline-dashboard
        app.kubernetes.io/component: pipeline
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: pipeline-dashboard
          image: clinical-pipeline-dashboard:latest
          ports:
            - containerPort: 8501
              protocol: TCP
          env:
            - name: NLP_BACKEND_URL
              value: "http://annotation-api:8001"
            - name: NLP_FRONTEND_URL
              value: "http://annotation-web:3000"
            - name: PIPELINE_API_URL
              value: "http://pipeline-api:8000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 15
