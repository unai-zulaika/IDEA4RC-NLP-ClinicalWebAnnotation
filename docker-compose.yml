services:
  # Main Annotation API (FastAPI)
  annotation-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: annotation-api
    ports:
      - "8001:8001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VLLM_ENDPOINT=${VLLM_API_URL:-http://host.docker.internal:8000}/v1
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/hf_cache
    volumes:
      - annotation-sessions:/app/sessions
      - ./backend/data/latest_prompts:/app/data/latest_prompts
      - ./backend/data/fast_prompts:/app/data/fast_prompts
      - ./data/dictionaries:/app/data/dictionaries:ro
      - annotation-faiss:/app/data/faiss_store
      - annotation-presets:/app/data/presets
      - annotation-hf-cache:/app/hf_cache
    networks:
      - clinical-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/server/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      # FAISS few-shot load takes ~60-90s on first boot. Without start_period
      # the healthcheck fires before uvicorn starts listening and `up` aborts
      # with "annotation-api is unhealthy" even though the API is fine.
      start_period: 120s

  # Annotation Web UI (Next.js)
  annotation-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_API_URL is baked into the bundle at build time, so it must
      # be passed as a build arg, not a runtime environment variable. Setting
      # it only under `environment:` has no effect on the browser-side URL.
      # Rebuild without cache after changing it: `docker compose build --no-cache annotation-web`
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    container_name: annotation-web
    ports:
      - "3000:3000"
    depends_on:
      annotation-api:
        condition: service_healthy
    networks:
      - clinical-network
    restart: unless-stopped

  # NLP Pipeline API (FastAPI)
  pipeline-api:
    build:
      context: ./pipeline/api
      dockerfile: Dockerfile
    container_name: pipeline-api
    ports:
      - "8010:8000"
    environment:
      - APP_PATH=/data/results/data
      - NLP_BACKEND_URL=http://annotation-api:8001
      - NLP_FRONTEND_URL=http://annotation-web:3000
    volumes:
      - ./data:/data/shared:ro
      - pipeline-results:/data/results
    networks:
      - clinical-network
    restart: unless-stopped

  # Pipeline Monitoring Dashboard (Streamlit)
  pipeline-dashboard:
    build:
      context: ./pipeline/status_web
      dockerfile: Dockerfile
    container_name: pipeline-dashboard
    ports:
      - "8501:8501"
    environment:
      - NLP_BACKEND_URL=http://annotation-api:8001
      - NLP_FRONTEND_URL=http://annotation-web:3000
      - PIPELINE_API_URL=http://pipeline-api:8000
    depends_on:
      - pipeline-api
    networks:
      - clinical-network
    restart: unless-stopped

volumes:
  annotation-sessions:
    driver: local
  annotation-faiss:
    driver: local
  annotation-presets:
    driver: local
  annotation-hf-cache:
    driver: local
  pipeline-results:
    driver: local

networks:
  clinical-network:
    driver: bridge
