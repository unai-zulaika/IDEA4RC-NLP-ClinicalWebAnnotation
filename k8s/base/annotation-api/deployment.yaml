apiVersion: apps/v1
kind: Deployment
metadata:
  name: annotation-api
  labels:
    app.kubernetes.io/name: annotation-api
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: annotation-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: annotation-api
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: annotation-api
          image: clinical-annotation-api:latest
          ports:
            - containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: annotation-api-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: sessions
              mountPath: /app/sessions
            - name: faiss-store
              mountPath: /app/data/faiss_store
            - name: presets
              mountPath: /app/data/presets
            - name: hf-cache
              mountPath: /app/hf_cache
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/server/status
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: sessions
          persistentVolumeClaim:
            claimName: annotation-sessions
        - name: faiss-store
          persistentVolumeClaim:
            claimName: annotation-faiss
        - name: presets
          persistentVolumeClaim:
            claimName: annotation-presets
        - name: hf-cache
          persistentVolumeClaim:
            claimName: annotation-hf-cache
